<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 주기율표 시뮬레이션 (1~20번)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            color: #e0e0ff;
            text-shadow: 0 0 20px rgba(100,150,255,0.8);
        }

        .subtitle {
            text-align: center;
            color: #aac;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* 범례 */
        .legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 25px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #ccd;
        }

        .legend-color {
            width: 22px;
            height: 22px;
            border-radius: 5px;
        }

        /* 원소 타입별 색상 - 3가지만 */
        .metal     { background: linear-gradient(135deg, #b71c1c, #e53935); }
        .nonmetal  { background: linear-gradient(135deg, #1b5e20, #43a047); }
        .metalloid { background: linear-gradient(135deg, #0d47a1, #1e88e5); }

        /* 족 번호 + 주기 레이블 래퍼 */
        .table-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }

        .group-labels {
            display: grid;
            grid-template-columns: 28px repeat(8, 1fr);
            gap: 8px;
            margin-bottom: 6px;
        }

        .group-lbl {
            text-align: center;
            font-size: 0.72rem;
            color: #7788aa;
            font-weight: bold;
        }

        /* 주기율표 본체 */
        .table-rows {
            display: grid;
            grid-template-columns: 28px repeat(8, 1fr);
            gap: 8px;
            row-gap: 8px;
        }

        .period-lbl {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            color: #7788aa;
            font-weight: bold;
        }

        .element {
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid rgba(255,255,255,0.15);
            position: relative;
        }

        .element:hover {
            transform: scale(1.12);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            z-index: 10;
            border-color: white;
        }

        .element .number {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.8);
            line-height: 1;
        }

        .element .symbol {
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            line-height: 1.1;
        }

        .element .name {
            font-size: 0.5rem;
            color: rgba(255,255,255,0.85);
            line-height: 1;
        }

        .empty {
            visibility: hidden;
            pointer-events: none;
        }

        /* 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, #1e1e3f, #2a2a5a);
            border-radius: 20px;
            padding: 30px;
            max-width: 480px;
            width: 90%;
            border: 2px solid rgba(150,150,255,0.4);
            box-shadow: 0 0 50px rgba(100,100,255,0.3);
            position: relative;
            animation: modalIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 20px;
        }

        .modal-symbol-box {
            width: 75px;
            height: 75px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .modal-symbol-box .m-number {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
        }

        .modal-symbol-box .m-symbol {
            font-size: 2.2rem;
            font-weight: bold;
            color: white;
            line-height: 1.1;
        }

        .modal-symbol-box .m-name {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.85);
        }

        .modal-title-area h2 {
            font-size: 1.5rem;
            color: #c8d8ff;
        }

        .modal-title-area .type-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            margin-top: 6px;
            color: white;
            font-weight: bold;
        }

        .badge-metal     { background: rgba(229, 57, 53, 0.5);  border: 1px solid #e53935; }
        .badge-nonmetal  { background: rgba(67, 160, 71, 0.5);  border: 1px solid #43a047; }
        .badge-metalloid { background: rgba(30, 136, 229, 0.5); border: 1px solid #1e88e5; }

        .modal-title-area .mass {
            font-size: 0.8rem;
            color: #aac;
            margin-top: 4px;
        }

        .section {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 3px solid;
        }

        .section.properties { border-color: #64b5f6; }
        .section.usage      { border-color: #81c784; }
        .section.fun        { border-color: #ffb74d; }

        .section h3 {
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .section.properties h3 { color: #64b5f6; }
        .section.usage h3      { color: #81c784; }
        .section.fun h3        { color: #ffb74d; }

        .section p {
            font-size: 0.82rem;
            line-height: 1.6;
            color: #ccd;
        }

        .close-btn {
            position: absolute;
            top: 14px; right: 18px;
            background: none;
            border: none;
            color: #aab;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover { color: white; }

        .hint {
            text-align: center;
            color: #778;
            font-size: 0.8rem;
            margin-top: 14px;
        }

        @media (max-width: 500px) {
            .element .symbol { font-size: 1rem; }
            .element .name   { font-size: 0.4rem; }
            .element .number { font-size: 0.5rem; }
            h1 { font-size: 1.4rem; }
            .table-rows, .group-labels {
                grid-template-columns: 20px repeat(8, 1fr);
                gap: 5px;
            }
        }
    </style>
</head>
<body>

<h1>🔬 주기율표 시뮬레이션</h1>
<p class="subtitle">원소를 클릭하면 성질과 실생활 사례를 알 수 있어요! (1~20번)</p>

<!-- 범례 -->
<div class="legend">
    <div class="legend-item">
        <div class="legend-color metal"></div>
        금속
    </div>
    <div class="legend-item">
        <div class="legend-color nonmetal"></div>
        비금속
    </div>
    <div class="legend-item">
        <div class="legend-color metalloid"></div>
        준금속
    </div>
</div>

<!-- 주기율표 -->
<div class="table-wrapper">

    <!-- 족 번호 -->
    <div class="group-labels">
        <div></div>
        <div class="group-lbl">1족</div>
        <div class="group-lbl">2족</div>
        <div class="group-lbl">13족</div>
        <div class="group-lbl">14족</div>
        <div class="group-lbl">15족</div>
        <div class="group-lbl">16족</div>
        <div class="group-lbl">17족</div>
        <div class="group-lbl">18족</div>
    </div>

    <!-- 본체 -->
    <div class="table-rows" id="tableRows"></div>

</div>

<p class="hint">💡 원소 카드를 클릭해 보세요!</p>

<!-- 모달 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div class="modal-header">
            <div class="modal-symbol-box" id="modalSymbolBox">
                <span class="m-number" id="mNumber"></span>
                <span class="m-symbol" id="mSymbol"></span>
                <span class="m-name"   id="mName"></span>
            </div>
            <div class="modal-title-area">
                <h2 id="mFullName"></h2>
                <div class="type-badge" id="mTypeBadge"></div>
                <div class="mass" id="mMass"></div>
            </div>
        </div>
        <div class="section properties">
            <h3>⚗️ 주요 성질</h3>
            <p id="mProperties"></p>
        </div>
        <div class="section usage">
            <h3>🌍 실생활에서의 쓰임새</h3>
            <p id="mUsage"></p>
        </div>
        <div class="section fun">
            <h3>💡 알고 있었나요?</h3>
            <p id="mFun"></p>
        </div>
    </div>
</div>

<script>

// ===================== 주기율표 레이아웃 =====================
const tableData = [
    { period: 1, cells: [1,    null, null, null, null, null, null, 2   ] },
    { period: 2, cells: [3,    4,    5,    6,    7,    8,    9,    10  ] },
    { period: 3, cells: [11,   12,   13,   14,   15,   16,   17,   18  ] },
    { period: 4, cells: [19,   20,   null, null, null, null, null, null] },
];

function buildTable() {
    const container = document.getElementById('tableRows');

    tableData.forEach(row => {
        // 주기 레이블
        const periodLabel = document.createElement('div');
        periodLabel.classList.add('period-lbl');
        periodLabel.textContent = row.period + '주기';
        container.appendChild(periodLabel);

        // 각 셀
        row.cells.forEach(num => {
            const div = document.createElement('div');
            if (num === null) {
                div.classList.add('element', 'empty');
                div.innerHTML = '&nbsp;';
            } else {
                const el = elements[num];
                div.classList.add('element', el.typeClass);
                div.innerHTML = `
                    <span class="number">${num}</span>
                    <span class="symbol">${el.symbol}</span>
                    <span class="name">${el.name}</span>
                `;
                div.addEventListener('click', () => openModal(num));
                div.setAttribute('title', el.name);
            }
            container.appendChild(div);
        });
    });
}

// ===================== 모달 열기/닫기 =====================
function openModal(num) {
    const el = elements[num];

    document.getElementById('mNumber').textContent     = num;
    document.getElementById('mSymbol').textContent     = el.symbol;
    document.getElementById('mName').textContent       = el.name;
    document.getElementById('mFullName').textContent   = el.fullName;
    document.getElementById('mMass').textContent       = el.mass;
    document.getElementById('mProperties').textContent = el.properties;
    document.getElementById('mUsage').textContent      = el.usage;
    document.getElementById('mFun').textContent        = el.fun;

    // 배지
    const badge = document.getElementById('mTypeBadge');
    badge.textContent = el.type;
    badge.className = 'type-badge badge-' + el.typeClass;

    // 심볼 박스 색상
    document.getElementById('modalSymbolBox').className = 'modal-symbol-box ' + el.typeClass;

    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

buildTable();
</script>
